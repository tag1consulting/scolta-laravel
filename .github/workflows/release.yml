name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Check out scolta-laravel into 'package/' so that '../scolta-php' resolves correctly
      - uses: actions/checkout@v4
        with:
          path: package

      # Check out scolta-php at the same tag into 'scolta-php/'
      - uses: actions/checkout@v4
        with:
          repository: tag1consulting/scolta-php
          ref: ${{ github.ref_name }}
          path: scolta-php

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl
          coverage: none

      - name: Install dependencies (no dev)
        working-directory: package
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Create release archive
        working-directory: package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd ..
          mv package scolta-laravel
          zip -r scolta-laravel-${VERSION}.zip scolta-laravel/ \
            --exclude "scolta-laravel/.git*" \
            --exclude "scolta-laravel/tests/*" \
            --exclude "scolta-laravel/node_modules/*" \
            --exclude "scolta-laravel/.claude/*"

      - name: Extract CHANGELOG entry
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            scolta-laravel/CHANGELOG.md > release-notes.txt
          cat release-notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.txt
          files: scolta-laravel-*.zip
          fail_on_unmatched_files: true

  validate-zip:
    name: Validate release archive
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Download release asset
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for i in 1 2 3 4 5; do
            gh release download "${GITHUB_REF_NAME}" \
              --repo "${{ github.repository }}" \
              --pattern "scolta-laravel-${VERSION}.zip" \
              --output scolta-laravel.zip && break
            echo "Retry $i/5..."
            sleep 5
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate archive structure
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          unzip -l scolta-laravel.zip > zip-contents.txt
          cat zip-contents.txt

          if ! grep -qE '^[[:space:]]+[0-9].*scolta-laravel/$' zip-contents.txt; then
            echo "ERROR: Top-level directory is not scolta-laravel/"
            exit 1
          fi

          if ! grep -q 'scolta-laravel/vendor/autoload.php' zip-contents.txt; then
            echo "ERROR: vendor/autoload.php is missing from archive"
            exit 1
          fi

          if ! grep -q 'scolta-laravel/src/ScoltaServiceProvider.php' zip-contents.txt; then
            echo "ERROR: src/ScoltaServiceProvider.php is missing from archive"
            exit 1
          fi

          echo "Archive structure OK."
